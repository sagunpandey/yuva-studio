<section class="home" (mousemove)="onMouseMove($event)">
  <!-- Scene-wide subtle backdrop -->
  <div class="scene-backdrop" aria-hidden="true"></div>

  <!-- Split Fiction Panels -->
  <nav class="split" aria-label="Choose a path to explore my sides">
    <a class="panel engineer"
       routerLink="/software-engineer"
       tabindex="0"
       aria-label="Software Engineer — go to Software Engineer page">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene programmer-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="monitor-glow"></div>
        <div class="desk"></div>
        <div class="keyboard"></div>
        <div class="laptop"></div>
        <div class="mug"></div>
        <div class="chair"></div>
        <div class="person">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
        </div>
        <div class="typing-lines">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="content">
        <i class="pi pi-code"></i>
        <h2>Programmer</h2>
        <p>Code. Craft. Ship.</p>
      </div>
    </a>

    <a class="panel photographer"
       routerLink="/photographer"
       tabindex="0"
       aria-label="Photographer — go to Photographer page">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene photographer-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="photo-card photo-card-one"></div>
        <div class="photo-card photo-card-two"></div>
        <div class="camera-flash"></div>
        <div class="camera-ring"></div>
        <div class="person">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
        </div>
        <div class="camera"></div>
      </div>
      <div class="content">
        <i class="pi pi-camera"></i>
        <h2>Photographer</h2>
        <p>Street & Portraits.</p>
      </div>
    </a>

    <a class="panel boardgamer"
       [routerLink]="['/board-gamer']"
       tabindex="0"
       aria-label="BoardGamer — go to Board Gamer page">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene boardgamer-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="table"></div>
        <div class="board-grid"></div>
        <div class="card card-left"></div>
        <div class="card card-right"></div>
        <div class="meeple meeple-left"></div>
        <div class="meeple meeple-right"></div>
        <div class="die"></div>
        <div class="token token-top"></div>
        <div class="person">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
        </div>
      </div>
      <div class="content">
        <i class="pi pi-th-large"></i>
        <h2>BoardGamer</h2>
        <p>Think. Cooperate. Win.</p>
      </div>
    </a>

    <a class="panel music"
       routerLink="/music"
       tabindex="0"
       aria-label="Music — go to Music page">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene music-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="spotlight"></div>
        <div class="mic-stand"></div>
        <div class="mic-head"></div>
        <div class="sound-wave sound-wave-one"></div>
        <div class="sound-wave sound-wave-two"></div>
        <div class="person">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
        </div>
        <div class="note note-one">♪</div>
        <div class="note note-two">♫</div>
      </div>
      <div class="content">
        <i class="pi pi-headphones"></i>
        <h2>Singer</h2>
        <p>Rhythms & Melodies.</p>
      </div>
    </a>

    <a class="panel travel"
       [routerLink]="['/links']"
       [queryParams]="{ category: 'travel' }"
       tabindex="0"
       aria-label="Travel — travel links">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene travel-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="sun"></div>
        <div class="cloud cloud-one"></div>
        <div class="cloud cloud-two"></div>
        <div class="mountain mountain-back"></div>
        <div class="mountain mountain-front"></div>
        <div class="path"></div>
        <div class="person">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
          <span class="bag"></span>
        </div>
      </div>
      <div class="content">
        <i class="pi pi-compass"></i>
        <h2>Travel</h2>
        <p>Roads. Skies. Stories.</p>
      </div>
    </a>

    <div class="panel life"
         tabindex="0">
      <span class="overlay"></span>
      <span class="glow"></span>
      <div class="panel-scene life-scene" aria-hidden="true">
        <div class="scene-floor"></div>
        <div class="pulse"></div>
        <div class="orb orb-one"></div>
        <div class="orb orb-two"></div>
        <div class="person seated">
          <span class="head"></span>
          <span class="body"></span>
          <span class="arm arm-left"></span>
          <span class="arm arm-right"></span>
        </div>
      </div>
      <div class="content">
        <i class="pi pi-heart"></i>
        <h2>Life</h2>
        <p>Curiosity & Balance.</p>
      </div>
    </div>
  </nav>
</section>
